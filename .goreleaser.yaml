version: 2

project_name: clex

before:
  hooks:
    - go mod tidy

builds:
  - id: clex
    main: ./cmd/clex
    binary: clex
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/reissui/clex/internal/version.Version={{ .Version }}

  - id: clexd
    main: ./cmd/clexd
    binary: clexd
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/reissui/clex/internal/version.Version={{ .Version }}

archives:
  - id: clex
    ids:
      - clex
      - clexd
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    files:
      - README.md
      - docs/config-reference.md
      - docs/fake-runner.md
      - deploy/systemd/clexd.service
      - deploy/launchd/com.reissui.clexd.plist

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: reissui
    name: clex

homebrew_casks:
  - name: clex
    ids:
      - clex
    binaries:
      - clex
      - clexd
    repository:
      owner: reissui
      name: homebrew-tap
    directory: Casks
    homepage: https://github.com/reissui/clex
    description: Self-hosted agentic development orchestrator
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/clex"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/clexd"]
          end
